services:
  # ── PostgreSQL for auth-service ──────────────────
  auth-db:
    image: postgres:16-alpine
    container_name: auth_db
    environment:
      POSTGRES_DB: auth_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 2025
    ports:
      - '5434:5432'  # accès depuis Mac sur 5432
    volumes:
      - auth_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      retries: 5

  # ── PostgreSQL for cloud-profile-service ─────────
  cloud-db:
    image: postgres:16-alpine
    container_name: cloud_profiles_db
    environment:
      POSTGRES_DB: cloud_profiles_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 2025
    ports:
      - '5433:5432'  # host port unique pour éviter conflit
    volumes:
      - cloud_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      retries: 5

  # ── pgAdmin (optional UI) ─────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@multicloud.com
      PGADMIN_DEFAULT_PASSWORD: pgadmin_password
    ports:
      - '5050:80'
    depends_on:
      - auth-db
      - cloud-db

  # ── SonarQube ─────────────────────────────────────
  sonarqube:
    image: sonarqube:10-community
    container_name: sonarqube
    depends_on:
      sonar-db:
        condition: service_healthy
    environment:
      SONAR_JDBC_URL: jdbc:postgresql://sonar-db:5432/sonarqube
      SONAR_JDBC_USERNAME: sonar
      SONAR_JDBC_PASSWORD: sonar
    ports:
      - '9000:9000'
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_logs:/opt/sonarqube/logs
      - sonarqube_extensions:/opt/sonarqube/extensions

  # ── PostgreSQL for SonarQube (separate DB) ────────
  sonar-db:
    image: postgres:16-alpine
    container_name: sonar_db
    environment:
      POSTGRES_DB: sonarqube
      POSTGRES_USER: sonar
      POSTGRES_PASSWORD: sonar
    ports:
      - '5435:5432'  # port host unique pour éviter conflit
    volumes:
      - sonar_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U sonar']
      interval: 10s
      retries: 5

volumes:
  auth_db_data:
  cloud_db_data:
  sonar_db_data:
  sonarqube_data:
  sonarqube_logs:
  sonarqube_extensions: